<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef Paula Bravo | Bolos Artesanais &#8212; Taubat&#233;/SP</title>
  <meta name="description" content="Bolos caseiros e artesanais feitos com amor pela Chef Paula Bravo em Taubat&#233;/SP. Encomendas especiais para todas as ocasi&#245;es." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Hero HOME ── */
    .hero {
      min-height: 100vh;
      padding-top: var(--nav-h);
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }
    .hero-img-col { position: relative; }
    .hero-img-col img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
    }
    .hero-img-col::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--creme) 100%);
    }
    .hero-content {
      display: flex; flex-direction: column; justify-content: center;
      padding: 4rem 5% 4rem 3rem;
      position: relative; z-index: 1;
    }
    .hero-content h1 {
      font-size: clamp(3rem, 5.5vw, 5.5rem);
      color: var(--vinho); line-height: 1.05; margin-bottom: 1.2rem;
    }
    .hero-content h1 em { font-style: italic; color: var(--terracota); }
    .hero-subtitle {
      font-family: var(--font-title); font-size: clamp(1.1rem, 2vw, 1.4rem);
      color: var(--text-mid); font-style: italic; margin-bottom: 0.6rem; font-weight: 400;
    }
    .hero-location {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--dourado); margin-bottom: 2.5rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
    .hero-deco {
      position: absolute; top: -60px; left: -60px;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Stats ── */
    .stats-bar { background: var(--vinho); padding: 50px 0; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 2rem; text-align: center;
    }
    .stat-number {
      font-family: var(--font-title); font-size: 3rem;
      font-weight: 700; color: var(--dourado-light); line-height: 1;
    }
    .stat-label {
      font-size: 0.8rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.7); margin-top: 0.4rem;
    }

    /* ── Diferenciais ── */
    .diferenciais-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 2rem; margin-top: 3rem;
    }
    .diferencial-card {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 2.2rem 1.8rem; text-align: center;
      box-shadow: var(--shadow); transition: var(--transition);
      border-bottom: 3px solid transparent;
    }
    .diferencial-card:hover { transform: translateY(-6px); border-bottom-color: var(--dourado); }
    .diferencial-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #F5EFE6, #EDE0CF);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
    }
    .diferencial-icon svg { width: 28px; height: 28px; color: var(--vinho); stroke: var(--vinho); fill: none; }
    .diferencial-card h3 { font-size: 1.05rem; color: var(--vinho); margin-bottom: 0.5rem; }
    .diferencial-card p { font-size: 0.88rem; color: var(--text-light); line-height: 1.65; }

    /* ── Produtos destaque ── */
    .produtos-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2rem; margin-top: 3rem;
    }

    /* ── Depoimentos ── */
    .depoimentos-section { background: var(--bege); }
    .depoimentos-wrapper {
      position: relative; max-width: 750px;
      margin: 3rem auto 0; min-height: 240px;
    }
    .depoimento-slide {
      position: absolute; inset: 0; opacity: 0;
      transition: opacity 0.7s ease;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2.5rem;
      background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow);
    }
    .depoimento-slide.active { opacity: 1; position: relative; }
    .depoimento-stars { color: var(--dourado); font-size: 1.2rem; margin-bottom: 1rem; }
    .depoimento-text {
      font-family: var(--font-title); font-size: 1.25rem; font-style: italic;
      color: var(--text-dark); margin-bottom: 1.2rem; line-height: 1.6;
    }
    .depoimento-autor {
      font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--vinho);
    }

    /* ── CTA final ── */
    .cta-section {
      background: linear-gradient(135deg, var(--vinho-dark) 0%, var(--vinho) 50%, var(--terracota) 100%);
      padding: 100px 0; text-align: center;
      position: relative; overflow: hidden;
    }
    .cta-section::before {
      content: '';
      position: absolute; top: 30px; left: 50%;
      transform: translateX(-50%);
      width: 32px; height: 32px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2' fill='rgba(201,169,110,0.3)' stroke='none'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-size: contain;
      pointer-events: none;
    }
    .cta-section h2 { color: var(--white); }
    .cta-section p { color: rgba(255,255,255,0.8); max-width: 500px; margin: 1rem auto 2.5rem; }
    .cta-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; grid-template-rows: 55vh auto; }
      .hero-img-col::after { background: linear-gradient(to bottom, transparent 60%, var(--creme) 100%); }
      .hero-content { padding: 3rem 5%; }
      .diferenciais-grid { grid-template-columns: 1fr 1fr; }
      .produtos-grid { grid-template-columns: 1fr 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    }
    @media (max-width: 600px) {
      .diferenciais-grid, .produtos-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
